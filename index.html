<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>F8 Project 03</title>
        <!-- Favicon -->
        <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
        <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
        <meta name="apple-mobile-web-app-title" content="Besnik." />
        <link rel="manifest" href="./assets/favicon/site.webmanifest" />

        <!-- Nhúng font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
            rel="stylesheet"
        />
        <!-- Rest CSS -->
        <link rel="stylesheet" href="./assets/css/reset.css" />

        <!-- Style CSS -->
        <link rel="stylesheet" href="./assets/css/styles.css" />
    </head>
    <body style="height: 8500px">
        <!-- ======== Header ======== -->
        <header class="header">
            <div class="main-content">
                <div class="header__wrap">
                    <a href="#!" class="logo">
                        <img src="./assets/img/besnik-logo.svg" alt="Besnik." class="logo__image" />
                    </a>
                    <ul class="navbar">
                        <li class="navbar__item">
                            <a href="#!" class="navbar__link navbar__item--active">Home</a>
                        </li>
                        <li class="navbar__item">
                            <a href="#!" class="navbar__link">Features</a>
                        </li>
                        <li class="navbar__item">
                            <a href="#!" class="navbar__link">Pricing</a>
                        </li>
                        <li class="navbar__item">
                            <a href="#!" class="navbar__link">About</a>
                        </li>
                        <li class="navbar__item">
                            <a href="#!" class="navbar__link">Contact</a>
                        </li>
                    </ul>
                    <div class="header-action">
                        <a href="#!" class="header-action__link">Sign in</a>
                        <a href="#!" class="btn header-action__btn">Sign up</a>
                    </div>
                </div>
            </div>
        </header>

        <!-- ======== Main ======== -->
        <main class="main">
            <!-- Hero -->
            <section class="hero">
                <div class="main-content">
                    <article class="hero__wrap">
                        <div class="hero__info">
                            <h1 class="hero__title">Words learner come here.</h1>
                            <p class="hero__desc">Build skills with courses, certificates, and get online knowledge from our world-class platform.</p>
                            <p class="hero__label">😎 EASY LEAENING PLATFORM</p>
                            <div class="hero__cta">
                                <a href="#!" class="btn hero__cta-btn">Get Started</a>

                                <button class="hero__cta-play">
                                    <svg width="14" height="18" viewBox="0 0 14 18" fill="none" xmlns="http://www.w3.org/2000/svg">
                                        <path d="M14 9L0 0V18L14 9Z" fill="currentColor" />
                                    </svg>
                                </button>
                            </div>
                        </div>
                        <div class="media">
                            <img src="./assets/img/hero-image-1.png" alt="Words learner come here." class="media__image" />
                            <!-- Media box 1 -->
                            <div class="media-box">
                                <img src="./assets/icons/Book.svg" alt="" class="media-box__icon" />
                                <span class="media-box__label">Courses 1000+</span>
                            </div>

                            <!-- Media box 2 -->
                            <div class="media-box">
                                <span class="media-box__label">Schedules</span>
                                <div class="media-box__crossbar-group">
                                    <span class="media-box__crossbar"></span>
                                    <span class="media-box__crossbar"></span>
                                    <span class="media-box__crossbar"></span>
                                    <span class="media-box__crossbar"></span>
                                </div>
                            </div>

                            <!-- Media box 3 -->
                            <div class="media-box">
                                <span class="media-box__label">Our Active Students</span>
                                <div class="media-box__avatar-group">
                                    <span class="media-box__avatar"></span>
                                    <span class="media-box__avatar"></span>
                                    <span class="media-box__avatar"></span>
                                    <span class="media-box__avatar"></span>
                                    <span class="media-box__avatar">10K+</span>
                                </div>
                            </div>
                        </div>
                    </article>
                </div>
            </section>
        </main>

        <!-- ======== Footer ======== -->
        <footer class="footer">Footer</footer>
    </body>
</html>
